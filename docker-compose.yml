services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev
    depends_on:
      - db
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://forgerag:forgerag_password@db:5432/forgerag

  db:
    image: postgres:16
    container_name: forgerag-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: forgerag
      POSTGRES_PASSWORD: forgerag_password
      POSTGRES_DB: forgerag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  rag-service:
    build:
      context: ./rag-service
    ports:
      - "8000:8000"
    environment:
      OPENAI_BASE_URL: http://host.docker.internal:1234/v1
      OPENAI_API_KEY: lm-studio
      EMBEDDING_MODEL: text-embedding-nomic-embed-text-v1.5
    extra_hosts:
      - "host.docker.internal:host-gateway"
volumes:
  postgres_data: